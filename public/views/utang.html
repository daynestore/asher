<section id="page-utang" class="module-page active">

        <div class="page-header">
          <div class="page-header-right">
            <button class="btn-primary" onclick="Pages._openAddCustomer()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
              Add Customer
            </button>
          </div>
        </div>
        <div class="row g-3 mb-4">
          <div class="col-12 col-md-4">
            <div class="stat-card stat-red">
              <div class="stat-card-label">Total Outstanding</div>
              <div class="stat-card-value" id="utang-total-outstanding">₱0.00</div>
            </div>
          </div>
          <div class="col-12 col-md-4">
            <div class="stat-card stat-primary">
              <div class="stat-card-label">Customers</div>
              <div class="stat-card-value" id="utang-customer-count">0</div>
            </div>
          </div>
        </div>
        <div class="section-card">
          <div class="section-card-header">
            <div class="search-wrapper" style="flex:1;max-width:320px">
              <svg class="search-icon-inner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0015.803 15.803z"/></svg>
              <input type="text" class="form-control" placeholder="Search customer..." oninput="Pages._renderUtangList(this.value)" aria-label="Search customers">
            </div>
          </div>
          <div class="table-responsive-wrapper" style="border:none;border-radius:0">
            <table class="ds-table" aria-label="Utang customer list">
              <thead><tr><th>Name</th><th>Phone</th><th>Balance</th><th>Actions</th></tr></thead>
              <tbody id="utang-tbody"></tbody>
            </table>
          </div>
        </div>
      
</section>
